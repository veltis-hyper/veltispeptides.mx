name: Deploy to Vercel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  generate-blogs:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate blog drafts and social media marketing copies
        run: |
          node scripts/generate-blogs.js
          node scripts/generate-social-copy.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'Daily: Generated 2 SEO blog posts'
          title: 'Daily Blog Posts - Generated by Copilot'
          body: '🤖 Automated daily blog post generation\n\nThis PR contains 2 new SEO-optimized blog posts ready for review and publication.'
          branch: 'daily-blogs-${{ github.run_number }}'
          delete-branch: true
